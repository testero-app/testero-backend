name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compile
        run: ./mvnw compile --batch-mode --no-transfer-progress
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/unused
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hs256

      - name: Checkstyle
        run: ./mvnw checkstyle:check --batch-mode --no-transfer-progress

      - name: SpotBugs
        run: ./mvnw compile spotbugs:check --batch-mode --no-transfer-progress
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/unused
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hs256

      - name: Test
        run: ./mvnw test --batch-mode --no-transfer-progress
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/unused
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hs256
