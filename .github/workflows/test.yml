name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test --batch-mode --no-transfer-progress
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/unused
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hs256
