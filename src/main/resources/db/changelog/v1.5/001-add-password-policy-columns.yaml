databaseChangeLog:
  - changeSet:
      id: v1.5-001-add-password-policy-columns
      author: testero
      comment: >
        Add must_change_password and password_expires_at columns to app_user
        for first-access set-password flow and password expiration.
      changes:
        - addColumn:
            tableName: app_user
            columns:
              - column:
                  name: must_change_password
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: password_expires_at
                  type: timestamp
        - update:
            tableName: app_user
            columns:
              - column:
                  name: must_change_password
                  valueBoolean: false
            where: "must_change_password = true"
      rollback:
        - dropColumn:
            tableName: app_user
            columnName: password_expires_at
        - dropColumn:
            tableName: app_user
            columnName: must_change_password
