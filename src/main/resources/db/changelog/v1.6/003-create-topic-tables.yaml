databaseChangeLog:
  - changeSet:
      id: v1.6-003
      author: testero
      comment: "Create topic and topic_subject tables for hierarchical topic→subject grouping"
      changes:
        - createTable:
            tableName: topic
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: abbreviation
                  type: VARCHAR(4)
              - column:
                  name: position
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
        - createTable:
            tableName: topic_subject
            columns:
              - column:
                  name: topic_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: subject_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
        - addPrimaryKey:
            tableName: topic_subject
            columnNames: topic_id, subject_id
            constraintName: pk_topic_subject
        - addForeignKeyConstraint:
            baseTableName: topic_subject
            baseColumnNames: topic_id
            referencedTableName: topic
            referencedColumnNames: id
            constraintName: fk_topic_subject_topic
        - addForeignKeyConstraint:
            baseTableName: topic_subject
            baseColumnNames: subject_id
            referencedTableName: subject
            referencedColumnNames: id
            constraintName: fk_topic_subject_subject
