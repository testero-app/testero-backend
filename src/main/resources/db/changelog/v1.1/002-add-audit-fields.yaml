databaseChangeLog:
  - changeSet:
      id: v1.1-002-add-audit-fields
      author: testero
      comment: >
        Add created_at and updated_at columns to all tables. Both default to
        CURRENT_TIMESTAMP. A reusable trigger function auto-updates updated_at
        on every row modification.
      changes:
        # --- trigger function (reusable across tables) ---
        - sql:
            splitStatements: false
            sql: >-
              CREATE OR REPLACE FUNCTION set_updated_at()
              RETURNS TRIGGER AS $body$
              BEGIN
                NEW.updated_at = CURRENT_TIMESTAMP;
                RETURN NEW;
              END;
              $body$ LANGUAGE plpgsql;

        # --- app_user: already has created_at, add updated_at ---
        - addColumn:
            tableName: app_user
            columns:
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - sql:
            sql: |
              CREATE TRIGGER trg_app_user_updated_at
              BEFORE UPDATE ON app_user
              FOR EACH ROW EXECUTE FUNCTION set_updated_at();

        # --- app_role ---
        - addColumn:
            tableName: app_role
            columns:
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
        - sql:
            sql: |
              CREATE TRIGGER trg_app_role_updated_at
              BEFORE UPDATE ON app_role
              FOR EACH ROW EXECUTE FUNCTION set_updated_at();

