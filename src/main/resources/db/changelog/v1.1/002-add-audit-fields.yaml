              DROP TRIGGER IF EXISTS trg_user_answer_selected_option_updated_at ON user_answer_selected_option;
              DROP TRIGGER IF EXISTS trg_user_answer_updated_at ON user_answer;
              DROP TRIGGER IF EXISTS trg_submission_updated_at ON submission;
              DROP TRIGGER IF EXISTS trg_option_updated_at ON option;
              DROP TRIGGER IF EXISTS trg_question_updated_at ON question;
              DROP TRIGGER IF EXISTS trg_class_test_updated_at ON class_test;
              DROP TRIGGER IF EXISTS trg_test_subject_updated_at ON test_subject;
              DROP TRIGGER IF EXISTS trg_subject_updated_at ON subject;
              DROP TRIGGER IF EXISTS trg_test_updated_at ON test;
              DROP TRIGGER IF EXISTS trg_teacher_class_updated_at ON teacher_class;
              DROP TRIGGER IF EXISTS trg_user_class_updated_at ON user_class;
              DROP TRIGGER IF EXISTS trg_student_profile_updated_at ON student_profile;
              DROP TRIGGER IF EXISTS trg_teacher_profile_updated_at ON teacher_profile;
              DROP TRIGGER IF EXISTS trg_app_user_role_updated_at ON app_user_role;
              DROP TRIGGER IF EXISTS trg_app_role_updated_at ON app_role;
              DROP TRIGGER IF EXISTS trg_app_user_updated_at ON app_user;
              DROP FUNCTION IF EXISTS set_updated_at();
        - dropColumn:
            tableName: user_answer_selected_option
