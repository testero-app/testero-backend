databaseChangeLog:
  - changeSet:
      id: v1.0-014
      author: testero
      changes:
        - createTable:
            tableName: submission
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: test_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamp
              - column:
                  name: submitted_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: score
                  type: double
        - addForeignKeyConstraint:
            baseTableName: submission
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_submission_user_id
        - addForeignKeyConstraint:
            baseTableName: submission
            baseColumnNames: test_id
            referencedTableName: test
            referencedColumnNames: id
            constraintName: fk_submission_test_id
      rollback:
        - dropTable:
            tableName: submission

  - changeSet:
      id: v1.0-015
      author: testero
      changes:
        - createTable:
            tableName: user_answer
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: submission_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: question_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: text
              - column:
                  name: motivation
                  type: text
              - column:
                  name: is_correct
                  type: boolean
              - column:
                  name: points_awarded
                  type: double
        - addForeignKeyConstraint:
            baseTableName: user_answer
            baseColumnNames: submission_id
            referencedTableName: submission
            referencedColumnNames: id
            constraintName: fk_user_answer_submission_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_answer
            baseColumnNames: question_id
            referencedTableName: question
            referencedColumnNames: id
            constraintName: fk_user_answer_question_id
      rollback:
        - dropTable:
            tableName: user_answer

  - changeSet:
      id: v1.0-016
      author: testero
      changes:
        - createTable:
            tableName: user_answer_selected_option
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: answer_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: option_id
                  type: uuid
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: user_answer_selected_option
            columnNames: answer_id, option_id
            constraintName: uq_user_answer_selected_option
        - addForeignKeyConstraint:
            baseTableName: user_answer_selected_option
            baseColumnNames: answer_id
            referencedTableName: user_answer
            referencedColumnNames: id
            constraintName: fk_user_answer_selected_option_answer_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_answer_selected_option
            baseColumnNames: option_id
            referencedTableName: option
            referencedColumnNames: id
            constraintName: fk_user_answer_selected_option_option_id
      rollback:
        - dropTable:
            tableName: user_answer_selected_option
