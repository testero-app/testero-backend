databaseChangeLog:
  - changeSet:
      id: v1.0-001
      author: testero
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
      rollback:
        - dropTable:
            tableName: app_user

  - changeSet:
      id: v1.0-002
      author: testero
      changes:
        - createTable:
            tableName: app_role
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
      rollback:
        - dropTable:
            tableName: app_role

  - changeSet:
      id: v1.0-003
      author: testero
      changes:
        - createTable:
            tableName: app_user_role
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: uuid
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: app_user_role
            columnNames: user_id, role_id
            constraintName: pk_app_user_role
        - addForeignKeyConstraint:
            baseTableName: app_user_role
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_app_user_role_user_id
        - addForeignKeyConstraint:
            baseTableName: app_user_role
            baseColumnNames: role_id
            referencedTableName: app_role
            referencedColumnNames: id
            constraintName: fk_app_user_role_role_id
      rollback:
        - dropTable:
            tableName: app_user_role

  - changeSet:
      id: v1.0-004
      author: testero
      changes:
        - createTable:
            tableName: teacher_profile
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
        - addForeignKeyConstraint:
            baseTableName: teacher_profile
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_teacher_profile_user_id
      rollback:
        - dropTable:
            tableName: teacher_profile
